      _inputs:
        footerLinksBackgroundColor:
          type: select
          comment: "Background color preset for featured service link tiles."
          options:
            values:
              - id: brand
                name: Brand
              - id: brand-secondary
                name: Brand Secondary
              - id: accent
                name: Accent (#fa5f30)
              - id: dark
                name: Dark (#2c363c)
              - id: black
                name: Black (#101926)
              - id: white
                name: White
        footerLinksHoverBackgroundColor:
          type: select
          comment: "Hover background color preset for featured service link tiles."
          options:
            values:
              - id: brand-secondary
                name: Brand Secondary
              - id: brand
                name: Brand
              - id: accent
                name: Accent
              - id: white
                name: White
        backgroundImage:
          type: object
          comment: Background image configuration for the footer section.
          options:
            preview:
              icon: image
              text:
                - key: alt
                - Background Image
              subtext:
                - key: source
                - Add an image source
              image:
                - key: source
        backgroundImage.source:
          type: image
          comment: URL or path to the background image.
          options:
            paths:
              uploads: src/assets/images
              static: ""
        backgroundImage.alt:
          type: textarea
          comment: Alt text for the background image.
        backgroundImage.positionVertical:
          type: select
          comment: Vertical position of the background image.
          options:
            values:
              - id: top
                name: Top
              - id: center
                name: Center
              - id: bottom
                name: Bottom
        backgroundImage.positionHorizontal:
          type: select
          comment: Horizontal position of the background image.
          options:
            values:
              - id: left
                name: Left
              - id: center
                name: Center
              - id: right
                name: Right
