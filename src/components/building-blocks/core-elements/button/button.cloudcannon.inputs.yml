text:
  type: markdown
  comment: The text that goes inside the button.
  options:
    blockquote: false
    bold: true
    format: span
    italic: true
    link: true
    strike: false
    subscript: true
    superscript: true
    underline: true
    bulletedlist: false
    numberedlist: false
  hidden: hideText
link:
  type: url
  comment: The URL to which the button should link.
  hidden: modalTarget
modalTarget:
  type: text
  comment: The ID of a modal element to open when the button is clicked.
  hidden: link
iconName:
  type: select
  comment: The name of the icon to display. See the Icon component documentation for more information.
  options:
    values: _select_data.icons
    preview:
      text:
        - key: name
      image:
        - template: src/icons/{id}.svg
iconPosition:
  type: select
  comment: The position of the icon relative to the text.
  hidden: "!iconName"
  options:
    values:
      - id: before
        name: Before
      - id: after
        name: After
hideText:
  type: switch
  hidden: "!iconName"
  comment: Whether to hide the button text and show only the icon.
variant:
  type: select
  comment: The presentation of button.
  options:
    values:
      - id: primary
        name: Primary
      - id: secondary
        name: Secondary
      - id: tertiary
        name: Tertiary
      - id: ghost
        name: Ghost
      - id: text
        name: Text
size:
  type: select
  comment: The font size of the button.
  options:
    values:
      - id: sm
        name: Small
      - id: md
        name: Medium
      - id: lg
        name: Large
width:
  type: select
  comment: Minimum width preset for the button.
  options:
    values:
      - id: none
        name: None
      - id: sm
        name: Small
      - id: md
        name: Medium
      - id: lg
        name: Large
      - id: xl
        name: Extra Large
borderRadius:
  type: select
  comment: Border radius preset for the button shape.
  options:
    values:
      - id: default
        name: Default
      - id: none
        name: None
      - id: xs
        name: Extra Small
      - id: sm
        name: Small
      - id: md
        name: Medium
      - id: lg
        name: Large
      - id: xl
        name: Extra Large
      - id: 2xl
        name: 2XL
      - id: 3xl
        name: 3XL
      - id: 4xl
        name: 4XL
      - id: full
        name: Full (Pill)
borderWidth:
  type: select
  comment: Border width preset.
  options:
    values:
      - id: default
        name: Default
      - id: none
        name: None
      - id: xs
        name: 1px
      - id: sm
        name: 2px
      - id: md
        name: 3px
borderColor:
  type: select
  comment: Border color preset.
  options:
    values:
      - id: default
        name: Default
      - id: standard
        name: Standard
      - id: subtle
        name: Subtle
      - id: strong
        name: Strong
      - id: brand
        name: Brand
      - id: transparent
        name: Transparent
textColor:
  type: select
  comment: Text color preset.
  options:
    values:
      - id: default
        name: Default
      - id: text
        name: Body Text
      - id: text-strong
        name: Strong Text
      - id: text-muted
        name: Muted Text
      - id: brand
        name: Brand
      - id: text-on-brand
        name: On Brand
      - id: text-inverse
        name: Inverse
uppercase:
  type: switch
  comment: Toggle button label text to uppercase.
