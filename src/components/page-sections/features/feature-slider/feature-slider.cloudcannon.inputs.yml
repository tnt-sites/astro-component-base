eyebrow:
  type: text
  comment: Optional eyebrow text displayed above the heading.
heading:
  type: markdown
  comment: Main heading for the slider section.
  options:
    blockquote: false
    bold: true
    format: p
    italic: true
    link: true
    strike: false
    subscript: true
    superscript: true
    underline: false
    bulletedlist: false
    numberedlist: false
    styles: /.cloudcannon/styles/editor.css
subtext:
  type: textarea
  comment: Supporting copy beneath the heading.
slides:
  type: array
  label: Slides
  comment: Structured feature slides rendered inside the carousel.
  options:
    structures:
      values:
        - label: Feature slide
          icon: view_carousel
          value:
            _component: page-sections/features/feature-slider/feature-slider-item
            eyebrow: ""
            title: Slide title
            description: Short description for this slide.
            imageSource: /src/assets/images/component-library/sunset.jpg
            imageAlt: Slide image alt text
            minSplitWidth: 0
          preview:
            text:
              - key: title
              - Feature slide
            subtext:
              - key: description
              - Add description for this slide
          _inputs:
            eyebrow:
              type: text
              comment: Optional eyebrow text displayed above the title.
            title:
              type: markdown
              comment: Heading text shown on the slide.
              options:
                blockquote: false
                bold: true
                format: p
                italic: true
                link: true
                strike: false
                subscript: true
                superscript: true
                underline: false
                bulletedlist: false
                numberedlist: false
                styles: /.cloudcannon/styles/editor.css
            description:
              type: markdown
              comment: Supporting body copy shown on the slide.
            imageSource:
              type: image
              comment: Image shown on the side of the slide.
              options:
                paths:
                  uploads: src/assets/images
                  static: ""
            imageAlt:
              type: text
              comment: Alt text describing the slide image.
            minSplitWidth:
              type: number
              comment: Container width (in px) before the split stacks vertically.
colorScheme:
  type: select
  comment: Color scheme theme applied to the section wrapper.
  options:
    values:
      - id: inherit
        name: Inherit
      - id: default
        name: Default
      - id: contrast
        name: Contrast
backgroundColor:
  type: select
  comment: Background color for the section.
  options:
    values:
      - id: none
        name: None
      - id: base
        name: Base
      - id: surface
        name: Surface
      - id: accent
        name: Accent
      - id: highlight
        name: Highlight
backgroundGradient:
  type: textarea
  comment: "Optional CSS gradient applied behind the section content."
backgroundImage:
  type: object
  comment: Background image configuration for the section.
  options:
    preview:
      icon: image
      text:
        - key: alt
        - Background Image
      subtext:
        - key: source
        - Add an image source
      image:
        - key: source
backgroundImage.source:
  comment: URL or path to the background image.
  type: image
  options:
    paths:
      uploads: src/assets/images
      static: ""
backgroundImage.alt:
  comment: Alt text for the background image.
  type: textarea
backgroundImage.positionVertical:
  comment: Vertical position of the background image.
  type: select
  options:
    values:
      - id: top
        name: Top
      - id: center
        name: Center
      - id: bottom
        name: Bottom
backgroundImage.positionHorizontal:
  comment: Horizontal position of the background image.
  type: select
  options:
    values:
      - id: left
        name: Left
      - id: center
        name: Center
      - id: right
        name: Right
