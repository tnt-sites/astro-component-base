heading:
  type: text
  comment: Main heading for the office tour section.
tourSlides:
  type: array
  label: Tour Slides
  comment: Slides displayed in the office tour carousel.
  options:
    structures:
      - label: Image Slide
        value:
          _component: building-blocks/core-elements/image
      - label: Video Slide
        value:
          _component: building-blocks/core-elements/video

backgroundColor:
  type: select
  comment: Background color used behind the office tour section.
  options:
    values:
      - id: none
        name: None
      - id: base
        name: Base
      - id: surface
        name: Surface
      - id: accent
        name: Accent
      - id: highlight
        name: Highlight
