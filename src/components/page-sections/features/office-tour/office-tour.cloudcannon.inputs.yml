heading:
  type: text
  label: "Section Heading"
  comment: "Main heading for the office tour section."

tourSlides:
  type: array
  label: "Tour Slides"
  comment: "Slides displayed in the office tour carousel."
  item:
    type: object
    fields:
      _component:
        type: select
        label: "Type"
        options:
          - label: Image
            value: building-blocks/core-elements/image
          - label: Video
            value: building-blocks/core-elements/video
      # Image fields
      src:
        type: file
        label: "Image file / Video file"
        accept: [".jpg", ".png", ".webp", ".mp4", ".mov"]
        required: false
      alt:
        type: text
        label: "Alt text (for images)"
        required: false
      caption:
        type: text
        label: "Caption / description"
        required: false
      # Video fields
      type:
        type: select
        label: "Video type"
        options:
          - label: YouTube
            value: youtube
          - label: Vimeo
            value: vimeo
      id:
        type: text
        label: "Video ID / URL"
        required: false

backgroundColor:
  type: select
  label: "Background Color"
  comment: "Background color used behind the office tour section."
  options:
    values:
      - id: none
        name: None
      - id: base
        name: Base
      - id: surface
        name: Surface
      - id: accent
        name: Accent
      - id: highlight
        name: Highlight
