heading:
  type: text
  label: "Section Heading"
  comment: "Main heading for the office tour section."

tourSlides:
  type: array
  label: "Tour Slides"
  comment: "Slides displayed in the office tour carousel."
  options:
    structures: _structures.tourSlides

backgroundColor:
  type: select
  label: "Background Color"
  comment: "Background color used behind the office tour section."
  options:
    values:
      - id: none
        name: None
      - id: base
        name: Base
      - id: surface
        name: Surface
      - id: accent
        name: Accent
      - id: highlight
        name: Highlight
