backgroundColor:
  type: select
  comment: Background color used behind the grid.
  options:
    values:
      - id: none
        name: None
      - id: base
        name: Base
      - id: surface
        name: Surface
      - id: accent
        name: Accent
      - id: highlight
        name: Highlight
slideNumbers:
  type: switch
  comment: "Toggle to display slide numbers (1/10) instead of indicator dots."
floatingArrows:
  type: switch
  comment: "Toggle to display floating arrows on the carousel."
tourSlides:
  type: array
  label: Tour Slides
  comment: Slides rendered in the office tour carousel.
  options:
    structures: _structures.carouselSections
