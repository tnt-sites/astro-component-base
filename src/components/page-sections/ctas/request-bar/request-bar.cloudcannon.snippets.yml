requestBar:
  template: mdx_component
  inline: false
  preview:
    text:
      - Request Bar
    subtext:
      - key: heading
    icon: calendar_month
  definitions:
    component_name: RequestBar
    named_args:
      - editor_key: id
        type: string
        optional: true
        remove_empty: true
      - editor_key: heading
        type: string
        optional: true
        remove_empty: true
      - editor_key: buttonText
        type: string
        optional: true
        remove_empty: true
      - editor_key: buttonLink
        type: string
        optional: true
        remove_empty: true
      - editor_key: buttonVariant
        type: string
        optional: true
        remove_empty: true
      - editor_key: backgroundColor
        type: string
        optional: true
        remove_empty: true
      - editor_key: backgroundGradient
        type: string
        optional: true
        remove_empty: true
      - editor_key: backgroundImage
        type: object
        optional: true
  _inputs_from_glob:
    - /src/components/page-sections/ctas/request-bar/request-bar.cloudcannon.inputs.yml
