heading:
  type: text
  comment: Main heading text.

subheading:
  type: text
  comment: Small heading text shown above the main heading.

subtext:
  type: textarea
  comment: Supporting text for the section.

callouts:
  type: array
  comment: Callout link items.
  options:
    structures: _structures.callouts

_structures:
  callouts:
    values:
      - label: Callout
        icon: image
        value:
          url: "#"
          icon: ""
          iconHover: ""
          alt: ""
          heading: ""
          text: ""
        _inputs:
          url:
            type: text
            comment: Link URL for this callout.
          icon:
            type: image
            comment: Default icon image.
            options:
              paths:
                uploads: src/assets/images
                static: ""
          iconHover:
            type: image
            comment: Hover-state icon image.
            options:
              paths:
                uploads: src/assets/images
                static: ""
          alt:
            type: text
            comment: Alt text for both callout icons.
          heading:
            type: text
            comment: Callout heading text.
          text:
            type: textarea
            comment: Callout description text.

imageSource:
  type: image
  comment: Image shown in the second split column.

imageAlt:
  type: text
  comment: Alt text for the image.

reverse:
  type: switch
  comment: Reverse the split layout order.

paddingVertical:
  type: select
  comment: Vertical padding for the section.
  options:
    values:
      - id: none
        name: None
      - id: xs
        name: XS
      - id: sm
        name: SM
      - id: md
        name: MD
      - id: lg
        name: LG
      - id: xl
        name: XL
      - id: 2xl
        name: 2XL
      - id: 3xl
        name: 3XL
      - id: 4xl
        name: 4XL
