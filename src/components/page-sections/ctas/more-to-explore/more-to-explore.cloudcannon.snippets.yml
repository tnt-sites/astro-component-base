moreToExplore:
  template: mdx_component
  inline: false
  preview:
    text:
      - More to Explore
    subtext:
      - key: heading
    icon: add
  definitions:
    component_name: MoreToExplore
    named_args:
      - editor_key: heading
        type: string
        optional: true
        remove_empty: true
      - editor_key: backgroundColor
        type: string
        optional: true
        remove_empty: true
      - editor_key: backgroundImage
        type: object
        optional: true
      - editor_key: buttonSections
        type: array
        optional: true
      - editor_key: maxContentWidth
        type: string
        optional: true
        remove_empty: true
      - editor_key: paddingHorizontal
        type: string
        optional: true
        remove_empty: true
      - editor_key: paddingVertical
        type: string
        optional: true
        remove_empty: true
      - editor_key: colorScheme
        type: string
        optional: true
        remove_empty: true
  _inputs_from_glob:
    - /src/components/page-sections/ctas/more-to-explore/more-to-explore.cloudcannon.inputs.yml
