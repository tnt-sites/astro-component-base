
buttonSections:
  type: array
  comment: Buttons for calls-to-action.
  options:
    structures: _structures.buttonSections
colorScheme:
  type: select
  comment: Color scheme theme for the CTA.
  options:
    values:
      - id: inherit
        name: Inherit
      - id: default
        name: Default
      - id: contrast
        name: Contrast
backgroundColor:
  type: select
  comment: Background color for the CTA.
  options:
    values:
      - id: none
        name: None
      - id: base
        name: Base
      - id: surface
        name: Surface
      - id: accent
        name: Accent
      - id: highlight
        name: Highlight
