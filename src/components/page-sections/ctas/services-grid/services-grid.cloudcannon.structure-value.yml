_structures:
  servicesGridItems:
    values:
      - label: Service Card
        icon: list
        value:
          _component: page-sections/ctas/services-grid/services-grid-item
          imageSource: ""
          imageAlt: Service image
          title: Service title
          href: service-page.html
          wide: false
          links:
            - _component: page-sections/ctas/services-grid/service-link
              label: Service detail link
              href: service-page.html#details
        preview:
          text:
            - key: title
            - Service Card
          subtext:
            - key: href
          image:
            - key: imageSource
        _inputs:
          imageSource:
            type: image
            comment: Card image for this service category.
            options:
              paths:
                uploads: src/assets/images
                static: ""
          imageAlt:
            type: text
            comment: Alt text for the card image.
          title:
            type: markdown
            comment: Card heading text.
          href:
            type: text
            comment: URL for the card heading link.
          wide:
            type: switch
            comment: Make this card span two columns on larger screens.
          links:
            type: array
            comment: Optional sub-links listed under the card heading.
            options:
              structures: _structures.servicesGridLinks
  servicesGridLinks:
    values:
      - label: Service Link
        icon: link
        value:
          _component: page-sections/ctas/services-grid/service-link
          label: Link label
          href: service-page.html#anchor
        preview:
          text:
            - key: label
            - Service Link
          subtext:
            - key: href
        _inputs:
          label:
            type: text
            comment: Label text for this service link.
          href:
            type: text
            comment: URL for this service link.
