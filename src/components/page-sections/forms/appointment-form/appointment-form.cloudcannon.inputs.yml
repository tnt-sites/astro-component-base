heading:
  type: markdown
  comment: Main heading for the appointment form section.
  options:
    blockquote: false
    bold: true
    format: p
    italic: true
    link: true
    strike: false
    subscript: true
    superscript: true
    underline: false
    bulletedlist: false
    numberedlist: false
    styles: /.cloudcannon/styles/editor.css
subtext:
  type: markdown
  comment: Optional supporting copy displayed beneath the heading.
  options:
    blockquote: false
    bold: true
    format: p
    italic: true
    link: true
    strike: false
    subscript: true
    superscript: true
    underline: false
    bulletedlist: false
    numberedlist: false
formAction:
  type: url
  comment: URL that processes the form submission.
formBlocks:
  type: array
  label: Form Fields
  comment: All form fields. Odd/even items pair into two columns; hidden fields and submit span full width.
  options:
    structures: _structures.formBlocks
id:
  type: text
  comment: Optional HTML id attribute for this component.
backgroundColor:
  type: select
  comment: Background color used behind the section.
  options:
    values:
      - id: none
        name: None
      - id: base
        name: Base
      - id: surface
        name: Surface
      - id: accent
        name: Accent
      - id: highlight
        name: Highlight
backgroundGradient:
  type: textarea
  comment: "Optional CSS gradient applied behind the section content."
backgroundImage:
  type: object
  comment: Background image configuration for the section.
  options:
    preview:
      icon: image
      text:
        - key: alt
        - Background Image
      subtext:
        - key: source
        - Add an image source
      image:
        - key: source
backgroundImage.source:
  comment: URL or path to the background image.
  type: image
  options:
    paths:
      uploads: src/assets/images
      static: ""
backgroundImage.alt:
  comment: Alt text for the background image.
  type: textarea
backgroundImage.positionVertical:
  comment: Vertical position of the background image.
  type: select
  options:
    values:
      - id: top
        name: Top
      - id: center
        name: Center
      - id: bottom
        name: Bottom
backgroundImage.positionHorizontal:
  comment: Horizontal position of the background image.
  type: select
  options:
    values:
      - id: left
        name: Left
      - id: center
        name: Center
      - id: right
        name: Right
# Add your other component inputs here
# Example:
# text:
#   type: text
#   comment: The text content for the component.