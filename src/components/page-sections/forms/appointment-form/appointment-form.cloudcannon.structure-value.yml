label: Appointment Form
icon: event
description: Section with a request-an-appointment form and editable fields.
value:
  _component: page-sections/forms/appointment-form
  id: ""
  heading: Request an Appointment
  subtext: ""
  formAction: ./
  formBlocks:
    - _component: building-blocks/forms/input
      label: Name
      name: name
      type: text
      required: true
    - _component: building-blocks/forms/select
      label: Are You a...
      name: patient
      required: true
      placeholder: Select one
      options:
        - value: new-patient
          label: New Patient
        - value: existing-patient
          label: Existing Patient
    - _component: building-blocks/forms/input
      label: Phone
      name: phone
      type: tel
      required: true
    - _component: building-blocks/forms/select
      label: Preferred Method of Communication
      name: communication
      required: false
      placeholder: Select one
      options:
        - value: phone
          label: Phone
        - value: text
          label: Text
        - value: email
          label: Email
    - _component: building-blocks/forms/input
      label: Email
      name: email
      type: email
      required: true
    - _component: building-blocks/forms/select
      label: How'd You Hear About Us?
      name: hear
      required: true
      placeholder: Select one
      options:
        - value: search-engine
          label: Search Engine
        - value: family-friend
          label: Family/Friend
        - value: promotion
          label: Promotion
        - value: social-media
          label: Social Media
        - value: other
          label: Other
    - _component: building-blocks/forms/input
      label: Your Dental Insurance
      name: insurance
      type: text
      required: false
    - _component: building-blocks/forms/select
      label: I Am Interested In...
      name: interested
      required: false
      placeholder: Select one
      options:
        - value: dental-checkup-cleaning
          label: Dental Checkup & Cleaning
        - value: traditional-braces
          label: Traditional Braces
        - value: invisalign
          label: Invisalign Clear Aligners
        - value: veneers
          label: Veneers
        - value: teeth-whitening
          label: Teeth Whitening
        - value: gummy-smile
          label: Gummy Smile
        - value: dental-implants
          label: Dental Implants
        - value: dentures
          label: Dentures
        - value: crowns
          label: Crowns
        - value: bridges
          label: Bridges
        - value: fillings
          label: Fillings
        - value: extractions
          label: Extractions
        - value: emergency-dental-care
          label: Emergency Dental Care
        - value: other
          label: Other
    - _component: building-blocks/forms/choice-group
      title: Preferred Day(s) of the Week
      name: day
      multiple: true
      required: false
      orientation: horizontal
      options:
        - value: monday
          label: Monday
          checked: false
        - value: tuesday
          label: Tuesday
          checked: false
        - value: wednesday
          label: Wednesday
          checked: false
        - value: thursday
          label: Thursday
          checked: false
        - value: friday
          label: Friday
          checked: false
    - _component: building-blocks/forms/textarea
      label: Questions or Comments
      name: comment
      required: false
    - _component: building-blocks/forms/hidden
      name: _subject
      value: Request Appointment
    - _component: building-blocks/forms/hidden
      name: _redirect
      value: thanks.html
    - _component: building-blocks/forms/submit
      text: Submit
      variant: primary
  backgroundColor: base
  backgroundGradient: ""
  backgroundImage:
    source: null
    alt: null
    positionVertical: top
    positionHorizontal: center
preview:
  text:
    - Appointment Form
  subtext:
    - key: heading
  icon: event
picker_preview:
  text: Appointment Form
  subtext: Request-an-appointment form with editable fields.
_inputs_from_glob:
  - /src/components/page-sections/forms/appointment-form/appointment-form.cloudcannon.inputs.yml
