meetSection:
  template: mdx_component
  inline: false
  preview:
    text:
      - Meet Section
    icon: add
  definitions:
    component_name: MeetSection
    named_args:
      - editor_key: heading
        type: string
        optional: true
        remove_empty: true
      - editor_key: backgroundColor
        type: string
        optional: true
        remove_empty: true
      - editor_key: backgroundImage
        type: object
        optional: true
      - editor_key: imageSource
        type: string
        optional: true
        remove_empty: true
      - editor_key: imageAlt
        type: string
        optional: true
        remove_empty: true
      - editor_key: doctors
        type: array
        optional: true
  _inputs_from_glob:
    - /src/components/page-sections/people/meet-section/meet-section.cloudcannon.inputs.yml