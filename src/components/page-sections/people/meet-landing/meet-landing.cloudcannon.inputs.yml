id:
  type: text
  comment: Optional HTML id attribute for this component.
variant:
  type: select
  comment: Choose how each provider label is rendered.
  options:
    values:
      - id: button
        name: Button Labels
      - id: name
        name: Name Labels
doctors:
  type: array
  label: Doctors
  comment: Doctor cards shown in the row.
  options:
    structures: _structures.meetLandingPeople
backgroundColor:
  type: select
  comment: Background color used behind the section.
  options:
    values:
      - id: none
        name: None
      - id: base
        name: Base
      - id: surface
        name: Surface
      - id: accent
        name: Accent
      - id: highlight
        name: Highlight
backgroundGradient:
  type: textarea
  comment: "Optional CSS gradient applied behind the section content."
backgroundImage:
  type: object
  comment: Background image configuration for the section.
  options:
    preview:
      icon: image
      text:
        - key: alt
        - Background Image
      subtext:
        - key: source
        - Add an image source
      image:
        - key: source
backgroundImage.source:
  comment: URL or path to the background image.
  type: image
  options:
    paths:
      uploads: src/assets/images
      static: ""
backgroundImage.alt:
  comment: Alt text for the background image.
  type: textarea
backgroundImage.positionVertical:
  comment: Vertical position of the background image.
  type: select
  options:
    values:
      - id: top
        name: Top
      - id: center
        name: Center
      - id: bottom
        name: Bottom
backgroundImage.positionHorizontal:
  comment: Horizontal position of the background image.
  type: select
  options:
    values:
      - id: left
        name: Left
      - id: center
        name: Center
      - id: right
        name: Right