emergencyGrid:
  template: mdx_component
  inline: false
  preview:
    text:
      - Emergency Grid
    icon: shield-exclamation
  definitions:
    component_name: EmergencyGrid
    named_args:
      - editor_key: heading
        type: string
        optional: true
        remove_empty: true
      - editor_key: subtext
        type: string
        optional: true
        remove_empty: true
      - editor_key: emergencyItems
        type: array
      - editor_key: backgroundImage
        type: object
        optional: true
      - editor_key: enableModals
        type: boolean
        optional: true
      - editor_key: backgroundColor
        type: string
        optional: true
        remove_empty: true
  _inputs_from_glob:
    - /src/components/page-sections/info-blocks/emergency-grid/emergency-grid.cloudcannon.inputs.yml
