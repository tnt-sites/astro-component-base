heading:
  type: markdown
  comment: Main heading for the FAQ section.
  options:
    blockquote: false
    bold: true
    format: p
    italic: true
    link: true
    strike: false
    subscript: true
    superscript: true
    underline: false
    bulletedlist: false
    numberedlist: false
    styles: /.cloudcannon/styles/editor.css
headingLevel:
  type: select
  comment: HTML heading level (h1-h6).
  options:
    values:
      - id: h1
        name: H1
      - id: h2
        name: H2
      - id: h3
        name: H3
      - id: h4
        name: H4
      - id: h5
        name: H5
      - id: h6
        name: H6
headingSize:
  type: select
  comment: Visual size of the heading.
  options:
    values:
      - id: xs
        name: Extra Small
      - id: sm
        name: Small
      - id: md
        name: Medium
      - id: lg
        name: Large
      - id: xl
        name: Extra Large
      - id: 2xl
        name: 2X Large
singleOpen:
  type: switch
  comment: Whether only one accordion item can be open at a time.
openFirst:
  type: switch
  comment: Whether the first accordion item should be open by default.
items:
  type: array
  label: FAQ Items
  comment: Questions and answers in the accordion.
  options:
    structures: _structures.faqItems
maxContentWidth:
  type: select
  comment: Maximum width of the content area.
  options:
    values:
      - id: sm
        name: Small
      - id: md
        name: Medium
      - id: lg
        name: Large
      - id: xl
        name: Extra Large
      - id: 2xl
        name: 2X Large
paddingHorizontal:
  type: select
  comment: Horizontal padding for the section.
  options:
    values:
      - id: none
        name: None
      - id: xs
        name: Extra Small
      - id: sm
        name: Small
      - id: md
        name: Medium
      - id: lg
        name: Large
      - id: xl
        name: Extra Large
paddingVertical:
  type: select
  comment: Vertical padding for the section.
  options:
    values:
      - id: none
        name: None
      - id: xs
        name: Extra Small
      - id: sm
        name: Small
      - id: md
        name: Medium
      - id: lg
        name: Large
      - id: xl
        name: Extra Large
      - id: 2xl
        name: 2X Large
      - id: 3xl
        name: 3X Large
      - id: 4xl
        name: 4X Large
colorScheme:
  type: select
  comment: Color scheme theme applied to the section wrapper.
  options:
    values:
      - id: inherit
        name: Inherit
      - id: default
        name: Default
      - id: contrast
        name: Contrast
backgroundColor:
  type: select
  comment: Background color for the section.
  options:
    values:
      - id: none
        name: None
      - id: base
        name: Base
      - id: surface
        name: Surface
      - id: accent
        name: Accent
      - id: highlight
        name: Highlight
backgroundGradient:
  type: textarea
  comment: "Optional CSS gradient applied behind the section content."
backgroundImage:
  type: object
  comment: Background image configuration for the section.
  options:
    preview:
      icon: image
      text:
        - key: alt
        - Background Image
      subtext:
        - key: source
        - Add an image source
      image:
        - key: source
backgroundImage.source:
  comment: URL or path to the background image.
  type: image
  options:
    paths:
      uploads: src/assets/images
      static: ""
backgroundImage.alt:
  comment: Alt text for the background image.
  type: textarea
backgroundImage.positionVertical:
  comment: Vertical position of the background image.
  type: select
  options:
    values:
      - id: top
        name: Top
      - id: center
        name: Center
      - id: bottom
        name: Bottom
backgroundImage.positionHorizontal:
  comment: Horizontal position of the background image.
  type: select
  options:
    values:
      - id: left
        name: Left
      - id: center
        name: Center
      - id: right
        name: Right
