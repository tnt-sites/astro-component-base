id:
  type: text
  comment: Optional HTML id attribute for this component.
backgroundColor:
  type: select
  comment: Background color used behind the section.
  options:
    values:
      - id: none
        name: None
      - id: base
        name: Base
      - id: surface
        name: Surface
      - id: accent
        name: Accent
      - id: highlight
        name: Highlight
backgroundGradient:
  type: textarea
  comment: "Optional CSS gradient applied behind the section content (for example: linear-gradient(120deg, #0f172a, #1d4ed8))."
backgroundImage:
  type: object
  comment: Background image configuration for the section.
  options:
    preview:
      icon: image
      text:
        - key: alt
        - Background Image
      subtext:
        - key: source
        - Add an image source
      image:
        - key: source
backgroundImage.source:
  comment: URL or path to the background image.
  type: image
  options:
    paths:
      uploads: src/assets/images
      static: ""
backgroundImage.alt:
  comment: Alt text for the background image.
  type: textarea
backgroundImage.positionVertical:
  comment: Vertical position of the background image.
  type: select
  options:
    values:
      - id: top
        name: Top
      - id: center
        name: Center
      - id: bottom
        name: Bottom
backgroundImage.positionHorizontal:
  comment: Horizontal position of the background image.
  type: select
  options:
    values:
      - id: left
        name: Left
      - id: center
        name: Center
      - id: right
        name: Right
siteName:
  type: text
  comment: "Business or site name used."
phoneText:
  type: text
  comment: "Visible phone number text."
phoneHref:
  type: text
  comment: "Phone link URL (e.g. tel:+12092163530)."
addressHref:
  type: text
  comment: "Map/location link URL for the address block."
addressLines:
  type: array
  comment: "Address lines shown as stacked text."
officeHoursTitle:
  type: text
  comment: "Heading for office hours."
officeHours:
  type: array
  comment: "Office hours entries with day, hours, and optional note shown beneath each row."
officeHoursNote:
  type: text
  comment: "General note displayed below the full office hours list (e.g. Closed on Sundays)."
officeHoursNotes:
  type: array
  comment: "Optional list of general notes displayed below the full office hours list."
mapEmbedUrl:
  type: text
  comment: "Optional Google Maps embed URL (iframe src value)."
# Add your other component inputs here
# Example:
# text:
#   type: text
#   comment: The text content for the component.