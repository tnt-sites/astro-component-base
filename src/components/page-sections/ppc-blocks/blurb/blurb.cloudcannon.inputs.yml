backgroundColor:
  type: select
  comment: Background color used behind the box.
  options:
    values:
      - id: none
        name: None
      - id: base
        name: Base
      - id: surface
        name: Surface
      - id: accent
        name: Accent
      - id: highlight
        name: Highlight
text:
  type: markdown
  comment: Main Text
  options:
    blockquote: false
    bold: true
    italic: true
    link: true
    strike: false
    subscript: true
    superscript: true
    underline: false
    bulletedlist: false
    numberedlist: false
textColor:
  type: color
  comment: Color of the text.
blurbBackgroundColor:
  type: select
  comment: Background color used inside the box.
  options:
    values:
      - id: none
        name: None
      - id: base
        name: Base
      - id: surface
        name: Surface
      - id: accent
        name: Accent
      - id: highlight
        name: Highlight
