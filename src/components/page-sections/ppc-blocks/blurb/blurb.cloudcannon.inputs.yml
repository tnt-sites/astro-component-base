backgroundColor:
  type: select
  comment: Background color used behind the box.
  options:
    values:
      - id: none
        name: None
      - id: base
        name: Base
      - id: surface
        name: Surface
      - id: accent
        name: Accent
      - id: highlight
        name: Highlight
text:
  type: html
  comment: Main Text
  options:
    styles: .cloudcannon/styles/editor.css
textColor:
  type: color
  comment: Color of the text.
blurbBackgroundColor:
  type: select
  comment: Background color used inside the box.
  options:
    values:
      - id: none
        name: None
      - id: base
        name: Base
      - id: surface
        name: Surface
      - id: accent
        name: Accent
      - id: highlight
        name: Highlight
