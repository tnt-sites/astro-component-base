backgroundColor:
  type: select
  comment: Background color used behind the grid.
  options:
    values:
      - id: none
        name: None
      - id: base
        name: Base
      - id: surface
        name: Surface
      - id: accent
        name: Accent
      - id: highlight
        name: Highlight
items:
  type: array
  comment: Blocks for each image + heading + text
  item:
    type: object
    properties:
      headingPrefix:
        type: text
        comment: First part of heading (e.g., "Looking for a")
      headingMain:
        type: text
        comment: Main heading (e.g., "New Dentist?")
      desktopImage:
        type: object
        comment: Image configuration for the desktop section.
        options:
          structures:
            values:
              - label: Desktop Image
                icon: image
                value:
                  _component: building-blocks/core-elements/image
                  source: ""
                  alt: ""
                _inputs:
                  source:
                    type: image
                    comment: The URL or path to the image.
                    options:
                      paths:
                        uploads: src/assets/images
                        static: ""
                  alt:
                    type: textarea
                    comment: Alternative text for accessibility.
      mobileImage:
        type: object
        comment: Image configuration for the mobile section.
        options:
          structures:
            values:
              - label: Mobile Image
                icon: image
                value:
                  _component: building-blocks/core-elements/image
                  source: ""
                  alt: ""
                _inputs:
                  source:
                    type: image
                    comment: The URL or path to the image.
                    options:
                      paths:
                        uploads: src/assets/images
                        static: ""
                  alt:
                    type: textarea
                    comment: Alternative text for accessibility.
      listText:
        type: markdown
        comment: Main Text
        options:
          blockquote: false
          bold: true
          italic: true
          link: true
          strike: false
          subscript: true
          superscript: true
          underline: false
          bulletedlist: true
          numberedlist: false
# Add your other component inputs here
