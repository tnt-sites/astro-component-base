backgroundColor:
  type: select
  comment: Background color used behind the grid.
  options:
    values:
      - id: none
        name: None
      - id: base
        name: Base
      - id: surface
        name: Surface
      - id: accent
        name: Accent
      - id: highlight
        name: Highlight
items:
  type: array
  comment: Blocks for each image + heading + text
  item:
    type: object
    properties:
      headingPrefix:
        type: text
        comment: First part of heading (e.g., "Looking for a")
      headingMain:
        type: text
        comment: Main heading (e.g., "New Dentist?")
      desktopImage:
        type: image
        comment: Desktop image URL
      mobileImage:
        type: image
        comment: Mobile image URL
      alt:
        type: text
        comment: Alt text for images
      listText:
        type: markdown
        comment: Main Text
        options:
          blockquote: false
          bold: true
          italic: true
          link: true
          strike: false
          subscript: true
          superscript: true
          underline: false
          bulletedlist: true
          numberedlist: false
# Add your other component inputs here
