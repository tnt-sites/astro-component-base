indexReviews:
  template: mdx_component
  inline: false
  preview:
    text:
      - Index Reviews
    icon: format_quote
  definitions:
    component_name: IndexReviews
    named_args:
      - editor_key: id
        type: string
        optional: true
        remove_empty: true
      - editor_key: heading
        type: string
        optional: true
        remove_empty: true
      - editor_key: reviews
        type: array
        optional: true
      - editor_key: showQuoteIcon
        type: boolean
        optional: true
        remove_empty: true
      - editor_key: backgroundColor
        type: string
        optional: true
        remove_empty: true
      - editor_key: backgroundGradient
        type: string
        optional: true
        remove_empty: true
      - editor_key: backgroundImage
        type: object
        optional: true
  _inputs_from_glob:
    - /src/components/page-sections/homepage-blocks/index-reviews/index-reviews.cloudcannon.inputs.yml
