label: Main Nav
icon: navigation
description: "Header navigation with logo, multi-level links, search, and page buttons."
value:
  _component: navigation/main-nav
  id: ""
  logoSource: /images/logo.svg
  logoAlt: "Logo"
  navData:
    - name: Home
      path: /
      children: []
  buttonSections:
    - _component: building-blocks/core-elements/button
      text: Search
      hideText: true
      link: /search/
      iconName: magnifying-glass
      iconPosition: before
      variant: ghost
      size: lg
      width: xs
  pageButtons:
    - _component: building-blocks/core-elements/button
      text: Request an Appointment
      hideText: false
      link: /request-an-appointment/
      iconName: ""
      iconPosition: before
      variant: primary
      size: md
      width: md
preview:
  text:
    - Main Nav
  icon: navigation
picker_preview:
  text: Main Nav
  subtext: "Header navigation with logo, links, search, and page buttons."
  icon: navigation
_inputs:
  logoSource:
    type: image
    comment: "Logo image source URL or path. Leave empty to hide the logo."
  logoAlt:
    type: text
    comment: "Alt text for the logo image for accessibility."
  navData:
    type: array
    comment: "Array of navigation items to render in the navigation bar."
    options:
      structures: _structures.navData
  buttonSections:
    type: array
    comment: "Buttons shown with the main navigation row (e.g. search icon button)."
    options:
      structures: _structures.buttonSections
  pageButtons:
    type: array
    comment: "Page Buttons shown to the right of the main navigation. Delete all to hide this area."
    options:
      structures: _structures.buttonSections
