logoSource:
  type: image
  comment: "Logo image source URL or path."
logoAlt:
  type: text
  comment: "Alt text for the logo image for accessibility."
id:
  type: text
  comment: "Developer use only. Optional HTML id attribute for this footer section."
siteName:
  type: text
  comment: "Business or site name used in legal copy."
contactTitle:
  type: markdown
  comment: "Heading for the contact area. Supports inline span wrappers/classes for highlighted words."
  options:
    blockquote: false
    bold: true
    format: p
    italic: true
    link: false
    strike: false
    subscript: true
    superscript: true
    underline: false
    bulletedlist: false
    numberedlist: false
    styles: /.cloudcannon/styles/editor.css
offices:
  type: array
  comment: "Optional office contact override for this landing footer."
pageButtons:
  type: array
  comment: "Optional CTA buttons shown near the logo."
  options:
    structures: _structures.buttonSections
socials:
  type: array
  comment: "Social links or icons for this landing footer."
legalLinks:
  type: array
  comment: "Legal links displayed in the footer legal row."
mapEmbedUrl:
  type: text
  comment: "Optional Google Maps embed URL (iframe src value)."
backgroundImage:
  type: image
  comment: "Optional footer background image URL/path."
backgroundGradient:
  type: text
  comment: "Optional CSS gradient value layered over background (e.g. linear-gradient(...))."
cardBackgroundColor:
  type: color
  comment: "Optional card background color for the overlapping contact card."
legalBlurb:
  type: textarea
  comment: "Optional legal/disclaimer text shown below the copyright row."
