logoSource:
  type: image
  comment: "Logo image source URL or path."
logoAlt:
  type: text
  comment: "Alt text for the logo image for accessibility."
id:
  type: text
  comment: "Developer use only. Optional HTML id attribute for this footer section."
siteName:
  type: text
  comment: "Business or site name used in legal copy."
contactTitle:
  type: markdown
  comment: "Heading for the contact area. Supports inline span wrappers/classes for highlighted words."
  options:
    blockquote: false
    bold: true
    format: p
    italic: true
    link: false
    strike: false
    subscript: true
    superscript: true
    underline: false
    bulletedlist: false
    numberedlist: false
    styles: /.cloudcannon/styles/editor.css
formTitle:
  type: text
  comment: "Heading for the TMJ footer form column."
formAction:
  type: text
  comment: "Form action URL for submissions."
formSubject:
  type: text
  comment: "Hidden _subject value sent with the form."
formRedirect:
  type: text
  comment: "Hidden _redirect value sent with the form."
formSubmitLabel:
  type: text
  comment: "Button label for the form submit button."
legalLinks:
  type: array
  comment: "Legal links displayed in the footer legal row."
backgroundImage:
  type: object
  comment: Background image configuration for the footer section.
  options:
    preview:
      icon: image
      text:
        - key: alt
        - Background Image
      subtext:
        - key: source
        - Add an image source
      image:
        - key: source
backgroundImage.source:
  comment: URL or path to the background image.
  type: image
  options:
    paths:
      uploads: src/assets/images
      static: ""
backgroundImage.alt:
  comment: Alt text for the background image.
  type: textarea
backgroundImage.positionVertical:
  comment: Vertical position of the background image.
  type: select
  options:
    values:
      - id: top
        name: Top
      - id: center
        name: Center
      - id: bottom
        name: Bottom
backgroundImage.positionHorizontal:
  comment: Horizontal position of the background image.
  type: select
  options:
    values:
      - id: left
        name: Left
      - id: center
        name: Center
      - id: right
        name: Right
backgroundGradient:
  type: text
  comment: "Optional CSS gradient value layered over background (e.g. linear-gradient(...))."
getStartedTitle:
  type: text
  comment: "Heading for the 'How to Get Started' column."
getStartedText:
  type: textarea
  comment: "Body text for the 'How to Get Started' column."
legalBlurb:
  type: textarea
  comment: "Optional legal/disclaimer text shown below the copyright row."
