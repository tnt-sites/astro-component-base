logoSource:
  type: image
  comment: "Logo image source URL or path."
logoAlt:
  type: text
  comment: "Alt text for the logo image for accessibility."
id:
  type: text
  comment: "Developer use only. Optional HTML id attribute for this footer section."
siteName:
  type: text
  comment: "Business or site name used in legal copy."
contactTitle:
  type: markdown
  comment: "Heading for the contact card. Supports inline span wrappers/classes for highlighted words."
  options:
    blockquote: false
    bold: true
    format: p
    italic: true
    link: false
    strike: false
    subscript: true
    superscript: true
    underline: false
    bulletedlist: false
    numberedlist: false
    styles: /.cloudcannon/styles/editor.css
offices:
  type: array
  comment: "Optional office contact override for this landing footer."
featuredServicesTitle:
  type: text
  comment: "Heading for the featured services card."
featuredServicesLinks:
  type: array
  comment: "Links shown in the featured services card."
  options:
    structures: _structures.links
formTitle:
  type: text
  comment: "Heading for the ask-a-question form card."
formAction:
  type: text
  comment: "Form action URL for submissions."
formSubject:
  type: text
  comment: "Hidden _subject value sent with the form."
formRedirect:
  type: text
  comment: "Hidden _redirect value sent with the form."
formSubmitLabel:
  type: text
  comment: "Button label for the form submit button."
footerLinksBackgroundColor:
  type: select
  comment: "Background color preset for featured service link tiles."
  options:
    values:
      - id: brand
        name: Brand
      - id: brand-secondary
        name: Brand Secondary
      - id: accent
        name: Accent
      - id: dark
        name: Dark
      - id: black
        name: Black
      - id: white
        name: White
footerLinksHoverBackgroundColor:
  type: select
  comment: "Hover background color preset for featured service link tiles."
  options:
    values:
      - id: brand-secondary
        name: Brand Secondary
      - id: brand
        name: Brand
      - id: accent
        name: Accent
      - id: dark
        name: Dark
      - id: black
        name: Black
      - id: white
        name: White
mapEmbedUrl:
  type: text
  comment: "Map iframe embed URL for the contact card; replaced by logo on mobile (<=768px)."
contactCardBackgroundColor:
  type: text
  comment: "Optional CSS color value for the contact card background."
servicesCardBackgroundColor:
  type: text
  comment: "Optional CSS color value for the featured services card background."
formCardBackgroundColor:
  type: text
  comment: "Optional CSS color value for the form card background."
legalLinks:
  type: array
  comment: "Legal links displayed in the footer legal row."
backgroundImage:
  type: object
  comment: Background image configuration for the footer section.
  options:
    preview:
      icon: image
      text:
        - key: alt
        - Background Image
      subtext:
        - key: source
        - Add an image source
      image:
        - key: source
backgroundImage.source:
  comment: URL or path to the background image.
  type: image
  options:
    paths:
      uploads: src/assets/images
      static: ""
backgroundImage.alt:
  comment: Alt text for the background image.
  type: textarea
backgroundImage.positionVertical:
  comment: Vertical position of the background image.
  type: select
  options:
    values:
      - id: top
        name: Top
      - id: center
        name: Center
      - id: bottom
        name: Bottom
backgroundImage.positionHorizontal:
  comment: Horizontal position of the background image.
  type: select
  options:
    values:
      - id: left
        name: Left
      - id: center
        name: Center
      - id: right
        name: Right
backgroundGradient:
  type: text
  comment: "Optional CSS gradient value layered over background (e.g. linear-gradient(...))."
legalBlurb:
  type: textarea
  comment: "Optional legal/disclaimer text shown below the copyright row."
