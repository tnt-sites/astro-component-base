logoSource:
  type: image
  comment: "Logo image source URL or path."
logoAlt:
  type: text
  comment: "Alt text for the logo image for accessibility."
links:
  type: array
  comment: "Array of navigation links to display in the footer."
socials:
  type: array
  comment: "Array of social media links to display in the footer."
siteName:
  type: text
  comment: "Business or site name used in the footer copyright line."
contactTitle:
  type: text
  comment: "Heading for the contact column (e.g. Contact Us)."
phoneText:
  type: text
  comment: "Visible phone number text."
phoneHref:
  type: text
  comment: "Phone link URL (e.g. tel:+12092163530)."
addressHref:
  type: text
  comment: "Map/location link URL for the address block."
addressLines:
  type: array
  comment: "Address lines shown as stacked text."
officeHoursTitle:
  type: text
  comment: "Heading for office hours column."
officeHours:
  type: array
  comment: "Office hours entries with day, hours, and optional note shown beneath each row."
officeHoursNote:
  type: text
  comment: "General note displayed below the full office hours list (e.g. Closed on Sundays)."
officeHoursNotes:
  type: array
  comment: "Optional list of general notes displayed below the full office hours list."
legalLinks:
  type: array
  comment: "Legal/utility links shown next to Sitemap/Privacy Policy (e.g. HIPAA Notice)."
mapEmbedUrl:
  type: text
  comment: "Optional Google Maps embed URL (iframe src value)."
legalBlurb:
  type: textarea
  comment: "Optional legal/disclaimer text shown below the copyright row."
