backgroundColor:
  type: select
  comment: Background color used behind the grid.
  options:
    values:
      - id: none
        name: None
      - id: base
        name: Base
      - id: surface
        name: Surface
      - id: accent
        name: Accent
      - id: highlight
        name: Highlight
items:
  type: array
  comment: Blocks for each image + heading + text
$.items[*].headingPrefix:
  type: markdown
  comment: First part of heading (e.g., "Looking for a")
  options:
    blockquote: false
    bold: true
    format: p
    italic: true
    link: true
    strike: false
    subscript: true
    superscript: true
    underline: false
    bulletedlist: false
    numberedlist: false
    styles: /.cloudcannon/styles/editor.css
$.items[*].headingMain:
  type: markdown
  comment: Main heading (e.g., "New Dentist?")
  options:
    blockquote: false
    bold: true
    format: p
    italic: true
    link: true
    strike: false
    subscript: true
    superscript: true
    underline: false
    bulletedlist: false
    numberedlist: false
    styles: /.cloudcannon/styles/editor.css
$.items[*].desktopImage.source:
  type: image
  comment: Desktop image source
$.items[*].desktopImage.alt:
  type: textarea
  comment: Desktop image alt text
$.items[*].mobileImage.source:
  type: image
  comment: Mobile image source
$.items[*].mobileImage.alt:
  type: textarea
  comment: Mobile image alt text
$.items[*].listText:
  type: markdown
  comment: Main Text
  options:
    blockquote: false
    bold: true
    format: p
    italic: true
    link: true
    strike: false
    subscript: true
    superscript: true
    underline: false
    bulletedlist: true
    numberedlist: false
    styles: /.cloudcannon/styles/editor.css
